services:
  gateway:
    build: .
    container_name: amberclaw-gateway
    restart: unless-stopped
    ports:
      - "18790:18790"
    volumes:
      - amberclaw-data:/app/data
    healthcheck:
      test: ["CMD", "amberclaw", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  cli:
    build: .
    profiles: ["cli"]
    volumes:
      - amberclaw-data:/app/data
    stdin_open: true
    tty: true
    command: ["status"]

volumes:
  amberclaw-data:
