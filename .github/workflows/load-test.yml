name: Load Tests

on:
  schedule:
    - cron: '0 2 * * *' # Run nightly

jobs:
  load_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust
      - name: Run Locust
        run: |
          locust -f tests/locustfile.py --headless -u 50 -r 10 --run-time 1m --host http://localhost:18790
