name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Bandit (Code Scanning)
        run: uv run bandit -r src/ -c pyproject.toml || true
        
      - name: Check Dependencies (Safety)
        run: uv run safety check --full-report || true
